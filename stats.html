<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05060d">
<title>The Council &amp; the Brain</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#05060d; --card:rgba(13,20,40,.58); --line:rgba(95,135,215,.16);
    --cyan:#00e5ff; --green:#27ffb0; --red:#ff4d6d; --mag:#ff4ddb; --violet:#9d7bff;
    --txt:#eaf3ff; --dim:#8aa0c8;
    --gcyan:0 0 18px rgba(0,229,255,.55);
  }
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
       background:var(--bg);color:var(--txt);overflow-x:hidden;-webkit-font-smoothing:antialiased;
       padding:max(16px,env(safe-area-inset-top)) 14px calc(30px + env(safe-area-inset-bottom));}
  .aurora{position:fixed;inset:0;z-index:-2;overflow:hidden;}
  .aurora i{position:absolute;border-radius:50%;filter:blur(80px);opacity:.42;animation:drift 20s ease-in-out infinite;}
  .aurora i:nth-child(1){width:360px;height:360px;background:#0a6bff;top:-110px;left:-70px;}
  .aurora i:nth-child(2){width:320px;height:320px;background:#00d39a;bottom:-90px;right:-80px;animation-delay:-7s;}
  .aurora i:nth-child(3){width:280px;height:280px;background:#c026ff;top:38%;left:46%;animation-delay:-13s;opacity:.28;}
  @keyframes drift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-34px) scale(1.14);}}
  .grain{position:fixed;inset:0;z-index:-1;background:
     linear-gradient(rgba(120,160,255,.025) 1px,transparent 1px) 0 0/100% 46px,
     radial-gradient(circle at 50% -10%,transparent,rgba(5,6,13,.7) 72%);}

  header{display:flex;align-items:center;justify-content:space-between;margin:2px 4px 14px;}
  .brand{font-size:11.5px;font-weight:800;letter-spacing:2.5px;color:#bcd3ff;text-transform:uppercase;}
  .hgrp{display:flex;align-items:center;gap:12px;}
  .snd{font-size:15px;opacity:.5;transition:opacity .2s,transform .1s;}
  .snd.on{opacity:1;filter:drop-shadow(0 0 8px var(--cyan));} .snd:active{transform:scale(.85);}
  .live{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;letter-spacing:1.5px;color:var(--green);}
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 1.6s ease-in-out infinite;}
  .live.off{color:var(--red);} .live.off .dot{background:var(--red);box-shadow:0 0 10px var(--red);}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.65);}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:22px;
        backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
        box-shadow:0 8px 32px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.05);margin-bottom:13px;}

  .hero{padding:22px 22px 20px;position:relative;overflow:hidden;cursor:pointer;transition:transform .12s;}
  .hero:active{transform:scale(.985);}
  .hero::before{content:'';position:absolute;top:-45%;right:-15%;width:240px;height:240px;background:radial-gradient(circle,rgba(0,229,255,.18),transparent 70%);}
  .k{font-size:11px;font-weight:700;letter-spacing:1.4px;color:var(--dim);text-transform:uppercase;}
  .hero .v{font-size:46px;font-weight:800;letter-spacing:-1px;margin-top:4px;line-height:1;
           background:linear-gradient(180deg,#fff,#7fe9ff);-webkit-background-clip:text;background-clip:text;color:transparent;
           text-shadow:0 0 34px rgba(0,229,255,.3);}
  .hero .sub{margin-top:11px;display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;}
  .chip{font-size:12.5px;font-weight:800;padding:4px 11px;border-radius:20px;}
  .chip.up{color:var(--green);background:rgba(39,255,176,.1);border:1px solid rgba(39,255,176,.32);box-shadow:0 0 14px rgba(39,255,176,.18);}
  .chip.down{color:var(--red);background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.32);box-shadow:0 0 14px rgba(255,77,109,.18);}
  .chip.flat{color:var(--dim);background:rgba(138,160,200,.1);border:1px solid rgba(138,160,200,.22);}

  /* EDGE CHART */
  .chartCard{padding:16px 16px 12px;}
  .chartTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .chartTop .e{font-size:20px;font-weight:800;letter-spacing:-.3px;}
  .seg{display:inline-flex;background:rgba(8,14,30,.7);border:1px solid var(--line);border-radius:11px;padding:2px;}
  .seg b{font-size:11px;font-weight:800;color:var(--dim);padding:4px 10px;border-radius:9px;cursor:pointer;transition:.2s;}
  .seg b.on{color:#04121a;background:linear-gradient(180deg,#7ff0ff,var(--cyan));box-shadow:0 0 12px rgba(0,229,255,.4);}
  canvas#edge{width:100%;height:152px;display:block;margin-top:6px;}
  .chartFoot{font-size:10px;color:var(--dim);margin-top:2px;text-align:right;}

  /* RANK */
  .rank{padding:15px 18px;display:flex;align-items:center;gap:14px;}
  .rank .icon{font-size:36px;filter:drop-shadow(0 0 12px rgba(0,229,255,.5));}
  .rank .title{font-size:20px;font-weight:800;color:#cfeaff;}
  .rank .tag{font-size:11px;color:var(--dim);font-style:italic;margin-top:1px;}
  .barwrap{height:7px;background:#0a1326;border-radius:5px;overflow:hidden;margin-top:9px;}
  .bar{height:100%;width:0;border-radius:5px;background:linear-gradient(90deg,#0096c7,var(--green));box-shadow:0 0 8px rgba(39,255,176,.55);transition:width 1s cubic-bezier(.4,1.3,.5,1);}
  .rank .hint{font-size:10px;color:#9fb2d6;margin-top:6px;}

  /* GRID */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px;}
  .stat{padding:15px 15px 14px;margin-bottom:0;}
  .stat .v{font-size:25px;font-weight:800;margin-top:5px;letter-spacing:-.5px;line-height:1;}
  .v.green{color:var(--green);text-shadow:0 0 16px rgba(39,255,176,.3);}
  .v.red{color:var(--red);text-shadow:0 0 16px rgba(255,77,109,.3);}
  .v.cyan{color:var(--cyan);text-shadow:var(--gcyan);}
  .stat.wide{grid-column:1/3;}
  .wr{height:8px;background:#0a1326;border-radius:5px;overflow:hidden;margin-top:10px;display:flex;}
  .wr .w{background:linear-gradient(90deg,#15a06f,var(--green));} .wr .l{background:linear-gradient(90deg,var(--red),#a8324a);}

  /* SEGMENTED LISTS */
  .tabs{display:flex;gap:8px;margin-bottom:11px;}
  .tab{flex:1;text-align:center;font-size:12px;font-weight:800;letter-spacing:.5px;padding:10px 0;border-radius:14px;
       color:var(--dim);background:var(--card);border:1px solid var(--line);cursor:pointer;transition:.2s;}
  .tab.on{color:#04121a;background:linear-gradient(180deg,#8af0ff,var(--cyan));border-color:transparent;box-shadow:0 0 16px rgba(0,229,255,.35);}
  .listCard{padding:6px 6px;max-height:46vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .listCard::-webkit-scrollbar{width:5px;} .listCard::-webkit-scrollbar-thumb{background:#23406e;border-radius:3px;}
  .row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid rgba(95,135,215,.08);}
  .row:last-child{border-bottom:0;}
  .row .sym{font-size:14px;font-weight:800;color:#eaf3ff;min-width:72px;}
  .dir{font-size:9px;font-weight:800;letter-spacing:.5px;padding:2px 7px;border-radius:20px;}
  .dir.l{color:var(--green);background:rgba(39,255,176,.1);border:1px solid rgba(39,255,176,.3);}
  .dir.s{color:var(--red);background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);}
  .row .det{flex:1;font-size:10px;color:var(--dim);}
  .row .rt{text-align:right;}
  .row .big{font-size:15px;font-weight:800;line-height:1.1;} .big.up{color:var(--green);} .big.down{color:var(--red);}
  .row .small{font-size:9.5px;color:var(--dim);}
  .empty{text-align:center;color:var(--dim);padding:26px;font-size:12.5px;}
  /* closed-trade expandable item + actively-managed-exit blip */
  .citem{border-bottom:1px solid rgba(95,135,215,.08);}
  .citem:last-child{border-bottom:0;}
  .citem .crow{border-bottom:0;cursor:pointer;}
  .blip{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--mag);
        box-shadow:0 0 9px var(--mag);margin-left:7px;vertical-align:middle;animation:blink 1.1s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.2;transform:scale(.55);}}
  .tdetail{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 12px;}
  .citem.open .tdetail{max-height:150px;padding-bottom:12px;}
  .why{font-size:11.5px;color:#e3edff;background:rgba(0,229,255,.06);border-left:3px solid var(--cyan);
       border-radius:0 8px 8px 0;padding:7px 10px;margin:0 0 9px;line-height:1.42;}
  .tstats{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:11px;color:var(--dim);}
  .tstats b{color:#eaf3ff;font-weight:700;}
  /* scholar bar */
  .sbar{flex:1;height:6px;background:#0a1326;border-radius:4px;overflow:hidden;margin:0 4px;}
  .sbar i{display:block;height:100%;border-radius:4px;}
  .row.benched{opacity:.45;}
  .srow{flex-direction:column;align-items:stretch;gap:6px;}
  .srow .top{display:flex;align-items:center;gap:10px;}
  .sins{font-size:10px;color:#93a7cc;font-style:italic;line-height:1.35;padding-left:2px;}

  /* EXITS card */
  .exits{padding:15px 18px;}
  .erow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(95,135,215,.07);font-size:12px;}
  .erow:last-child{border-bottom:0;}
  .erow .rg{min-width:62px;font-weight:800;color:#cfe0ff;}
  .erow .m{flex:1;display:flex;gap:12px;color:var(--dim);font-size:11px;}
  .erow .m b{color:#eaf3ff;font-weight:700;}
  .erow .dim{color:var(--dim);font-size:11px;font-style:italic;}
  .eff{font-weight:800;} .eff.g{color:var(--green);} .eff.y{color:#ffd24a;} .eff.r{color:var(--red);}
  footer{text-align:center;margin-top:16px;font-size:10px;letter-spacing:1px;color:#46587b;cursor:pointer;}
  footer:active{color:var(--cyan);}
  .flash{animation:fl .6s ease;} @keyframes fl{0%{color:var(--cyan);text-shadow:0 0 18px var(--cyan);}100%{}}

  /* TOAST */
  #toast{position:fixed;left:50%;top:calc(14px + env(safe-area-inset-top));
         z-index:40;display:flex;align-items:center;gap:9px;padding:11px 16px;border-radius:16px;
         background:rgba(13,22,44,.92);backdrop-filter:blur(18px);border:1px solid var(--line);
         box-shadow:0 10px 34px rgba(0,0,0,.5);font-size:13px;font-weight:700;white-space:nowrap;
         transition:transform .4s cubic-bezier(.3,1.2,.4,1);transform:translate(-50%,-160%);}
  #toast.on{transform:translate(-50%,0);}
</style>
</head>
<body>
<div class="aurora"><i></i><i></i><i></i></div><div class="grain"></div>

<header>
  <div class="brand">The Council &amp; the Brain</div>
  <div class="hgrp">
    <span class="snd on" id="snd">🔔</span>
    <span class="live off" id="live"><span class="dot"></span><span id="liveTxt">CONNECTING</span></span>
  </div>
</header>

<div class="card hero" id="heroCard">
  <div class="k">Equity · live <span style="color:var(--cyan);font-weight:800">· tap for trades ›</span></div>
  <div class="v" id="equity">—</div>
  <div class="sub"><span class="chip flat" id="floatChip">—</span><span style="font-size:12px;color:var(--dim)" id="openTxt">—</span></div>
</div>

<div class="card chartCard">
  <div class="chartTop">
    <div><div class="k">Edge curve</div><div class="e" id="edgeNow">—</div></div>
    <div class="seg"><b class="on" data-m="R">cum R</b><b data-m="$">cum $</b></div>
  </div>
  <canvas id="edge"></canvas>
  <div class="chartFoot" id="edgeFoot">—</div>
</div>

<div class="card rank">
  <div class="icon" id="rIcon">🥚</div>
  <div style="flex:1;min-width:0;">
    <div class="title" id="rTitle">—</div><div class="tag" id="rTag">—</div>
    <div class="barwrap"><div class="bar" id="rBar"></div></div>
    <div class="hint" id="rHint">—</div>
  </div>
</div>

<div class="card exits">
  <div class="k">Exits · learning <span style="color:var(--mag);font-weight:800">· how it manages trades</span></div>
  <div id="exitRows"><div class="erow"><span class="dim">warming up…</span></div></div>
</div>

<div class="grid">
  <div class="card stat"><div class="k">Balance</div><div class="v cyan" id="balance">—</div></div>
  <div class="card stat"><div class="k">Net P&amp;L</div><div class="v" id="net">—</div></div>
  <div class="card stat"><div class="k">Closed · acct</div><div class="v" id="closed">—</div></div>
  <div class="card stat"><div class="k">Margin level</div><div class="v" id="marginLvl">—</div><div class="small" id="margin" style="margin-top:5px;color:var(--dim)">—</div></div>
  <div class="card stat wide">
    <div class="k">Win rate</div><div class="v" id="wr">—</div>
    <div class="wr"><div class="w" id="wrW" style="width:0"></div><div class="l" id="wrL" style="width:0"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--dim)">
      <span style="color:var(--green)" id="wins">—</span><span style="color:var(--red)" id="losses">—</span></div>
  </div>
</div>

<div class="tabs">
  <div class="tab on" data-t="live" id="tabLive">⚡ Live</div>
  <div class="tab" data-t="closed">📜 Closed</div>
  <div class="tab" data-t="scholars">🧠 Scholars</div>
</div>
<div class="card listCard" id="list"><div class="empty">loading…</div></div>

<footer id="foot">updating…</footer>
<div id="toast"></div>

<script>
const API="https://hermes-trading-production-1c86.up.railway.app";
const $=id=>document.getElementById(id);
const money=n=>(n<0?'-$':'$')+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0});
const money2=n=>(n<0?'-$':'$')+Math.abs(n).toFixed(2);
const get=p=>fetch(API+p,{cache:'no-store'}).then(r=>r.json());
function flash(el){el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
function setV(id,v){const el=$(id);if(el&&el.textContent!==String(v)){el.textContent=v;flash(el);}}
function ago(ts){const s=(Date.now()-new Date(ts).getTime())/1000;if(s<60)return Math.floor(s)+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}

/* ── ladder ── */
const LADDER=[
 {at:0,me:-9,i:'🥚',t:'Unhatched',g:'pure potential, zero scars'},{at:3,me:-9,i:'🍼',t:'Newborn',g:'just opened its eyes'},
 {at:10,me:-9,i:'👶',t:'Infant',g:'grabs at every shiny candle'},{at:30,me:-9,i:'🧒',t:'Novice',g:'knows the words, not the music'},
 {at:60,me:-0.15,i:'📚',t:'Student',g:'studying its own scars'},{at:90,me:-0.02,i:'🔍',t:'Edge-Seeker',g:'circling a real edge'},
 {at:120,me:0.04,i:'⚖️',t:'Break-Even',g:'finally stopped bleeding'},{at:180,me:0.10,i:'🌱',t:'Consistent',g:'a small, repeatable edge'},
 {at:280,me:0.18,i:'💹',t:'Skilled Trader',g:'wins by design, not luck'},{at:450,me:0.25,i:'🎯',t:'Sharp',g:'calm hands, sharp reads'},
 {at:700,me:0.32,i:'🧠',t:'Master',g:'reads the tape like a language'},{at:1100,me:0.40,i:'🏆',t:'Elite',g:'top 1% — thrives in chaos'},
 {at:1800,me:0.48,i:'🦅',t:'Grandmaster',g:'the market bends a little'},{at:3000,me:0.58,i:'🐲',t:'Legend',g:'whispered about across desks'},
 {at:5000,me:0.70,i:'🌌',t:'God-Mode',g:'absolute mastery — alpha at will'},
];
function renderRank(cl,exp){
  let ri=0;for(let i=0;i<LADDER.length;i++){if(cl>=LADDER[i].at&&exp>=LADDER[i].me)ri=i;}
  const cur=LADDER[ri],nxt=LADDER[ri+1]||null;
  $('rIcon').textContent=cur.i;$('rTitle').textContent=cur.t;$('rTag').textContent='“'+cur.g+'”';
  if(nxt){const xp=(cl-cur.at)/Math.max(1,nxt.at-cur.at),es=nxt.me-cur.me,ep=es>0?(exp-cur.me)/es:1;
    $('rBar').style.width=(Math.max(0,Math.min(1,Math.min(xp,ep)))*100)+'%';
    const p=[];if(cl<nxt.at)p.push((nxt.at-cl)+' trades');if(exp<nxt.me)p.push('+'+nxt.me.toFixed(2)+'R edge');
    $('rHint').innerHTML=cl+' trades · edge <b>'+(exp>=0?'+':'')+exp.toFixed(2)+'R</b> · needs '+(p.join(' + ')||'consistency')+' → '+nxt.t+' '+nxt.i;
  }else{$('rBar').style.width='100%';$('rHint').innerHTML='<b>GOD-MODE — top of the mountain</b> 🌌';}
}

/* ── neon edge chart ── */
let chartMode='R', _closedSorted=[];
function drawEdge(){
  const cv=$('edge'),dpr=window.devicePixelRatio||1,w=cv.clientWidth,h=cv.clientHeight;
  cv.width=w*dpr;cv.height=h*dpr;const x=cv.getContext('2d');x.scale(dpr,dpr);x.clearRect(0,0,w,h);
  // cumulative value at each trade's REAL timestamp → a true time series
  let cum=0;const pts=[];
  _closedSorted.forEach(t=>{cum+=chartMode==='R'?(+t.pnl_r||0):(+t.real_profit||0);pts.push({t:new Date(t.exit_ts).getTime(),v:cum});});
  $('edgeNow').textContent=chartMode==='R'?((cum>=0?'+':'')+cum.toFixed(1)+'R'):money2(cum);
  $('edgeNow').style.color=cum>=0?'var(--green)':'var(--red)';
  const N=pts.length;
  if(N<2){x.fillStyle='#5a6e95';x.font='12px -apple-system';x.textAlign='center';x.fillText('edge curve builds as trades close',w/2,h/2);x.textAlign='left';$('edgeFoot').textContent=N+' brain trades';return;}
  const tMax=Math.max(pts[N-1].t,Date.now());
  const tMin=pts[0].t-Math.max(60000,(tMax-pts[0].t)*0.03);   // small lead-in from 0
  pts.unshift({t:tMin,v:0});
  if(tMax>pts[pts.length-1].t+30000) pts.push({t:tMax,v:cum});  // flat line to "now"
  const vals=pts.map(p=>p.v),mn=Math.min(0,...vals),mx=Math.max(0,...vals);
  const pad=6,labelH=12,volH=11,gw=w-pad*2,gh=h-pad*2-labelH-volH;
  const volBot=pad+gh+2+volH;                          // bottom of the volume sub-panel
  const oneDay=86400000,spanD=(tMax-tMin)/oneDay;
  const X=t=>pad+(tMax===tMin?gw/2:(t-tMin)/(tMax-tMin)*gw);
  const Y=v=>pad+(mx===mn?gh/2:(1-(v-mn)/(mx-mn))*gh);
  // ── VOLUME sub-panel: trades that CLOSED each day (one faint bar per day) ──
  const dayKey=ts=>{const d=new Date(ts);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();};
  const counts={};_closedSorted.forEach(t=>{const k=dayKey(t.exit_ts);counts[k]=(counts[k]||0)+1;});
  const maxC=Math.max(1,...Object.values(counts));
  const bw=Math.max(2,Math.min(16,gw/Math.max(1,spanD)*0.55));
  for(let dd=new Date(tMin);dd.getTime()<=tMax+oneDay;dd=new Date(dd.getTime()+oneDay)){
    const k=dd.getFullYear()+'-'+(dd.getMonth()+1)+'-'+dd.getDate(),cnt=counts[k]||0;if(!cnt)continue;
    const cx=X(Math.min(tMax,Math.max(tMin,dd.getTime()+oneDay/2)));
    const bh=Math.max(2,cnt/maxC*volH);
    x.fillStyle='rgba(0,229,255,.30)';x.fillRect(cx-bw/2,volBot-bh,bw,bh);
  }
  // ── DATE axis (adaptive) with the day's closed-trade count ──
  x.font='9px -apple-system';
  if(spanD>=1){
    const stepD=Math.max(1,Math.ceil(spanD/5));
    let d=new Date(tMin);d.setHours(0,0,0,0);d=new Date(d.getTime()+oneDay);
    for(;d.getTime()<=tMax;d=new Date(d.getTime()+stepD*oneDay)){
      const xx=X(d.getTime());if(xx<pad+12||xx>w-pad-30)continue;
      x.strokeStyle='rgba(140,165,210,.12)';x.lineWidth=1;x.beginPath();x.moveTo(xx,pad);x.lineTo(xx,pad+gh);x.stroke();
      const k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
      x.fillStyle='#7188ad';x.textAlign='center';
      x.fillText((d.getMonth()+1)+'/'+d.getDate()+(counts[k]?'·'+counts[k]:''),xx,h-2);
    }
  }else{
    for(let k=1;k<4;k++){const tt=tMin+(tMax-tMin)*k/4,xx=X(tt);
      x.strokeStyle='rgba(140,165,210,.1)';x.lineWidth=1;x.beginPath();x.moveTo(xx,pad);x.lineTo(xx,pad+gh);x.stroke();
      x.fillStyle='#7188ad';x.textAlign='center';x.fillText(new Date(tt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),xx,h-2);}
  }
  x.fillStyle='#9ab8e0';x.textAlign='right';x.fillText('now',w-pad-1,h-2);x.textAlign='left';
  // ── Y-AXIS value labels (R or $) at the top & bottom of the range ──
  const fmtY=v=>chartMode==='R'?((v>=0?'+':'')+v.toFixed(Math.abs(v)>=10?0:1)+'R'):money(v);
  x.font='9px -apple-system';x.fillStyle='#6f86ad';x.textAlign='left';
  x.fillText(fmtY(mx),pad+1,pad+8);
  if(mn<-0.05) x.fillText(fmtY(mn),pad+1,pad+gh-2);
  // ── zero baseline ──
  const yz=Y(0);x.strokeStyle='rgba(140,165,210,.28)';x.setLineDash([4,4]);x.lineWidth=1;x.beginPath();x.moveTo(pad,yz);x.lineTo(w-pad,yz);x.stroke();x.setLineDash([]);
  const pos=cum>=0,c1=pos?'rgba(39,255,176,':'rgba(255,77,109,';
  // area fill
  const grad=x.createLinearGradient(0,pad,0,pad+gh);grad.addColorStop(0,c1+'.32)');grad.addColorStop(1,c1+'0)');
  x.beginPath();x.moveTo(X(pts[0].t),Y(pts[0].v));pts.forEach(p=>x.lineTo(X(p.t),Y(p.v)));
  x.lineTo(X(pts[pts.length-1].t),pad+gh);x.lineTo(X(pts[0].t),pad+gh);x.closePath();x.fillStyle=grad;x.fill();
  // glow line
  x.beginPath();pts.forEach((p,i)=>i?x.lineTo(X(p.t),Y(p.v)):x.moveTo(X(p.t),Y(p.v)));
  x.lineWidth=2.4;x.strokeStyle=pos?'#34ffb6':'#ff5e7c';x.shadowColor=pos?'#27ffb0':'#ff4d6d';x.shadowBlur=12;x.lineJoin='round';x.stroke();x.shadowBlur=0;
  // head dot at "now"
  const last=pts[pts.length-1];x.beginPath();x.arc(X(last.t),Y(last.v),3.4,0,7);x.fillStyle='#fff';x.shadowColor=pos?'#27ffb0':'#ff4d6d';x.shadowBlur=14;x.fill();x.shadowBlur=0;
  $('edgeFoot').textContent=N+' brain trades · '+ago(_closedSorted[0].exit_ts)+' ago → now';
}

/* ── lists ── */
let _pos=[],_closed=[],_scholars=[],curTab='live',_expanded=new Set();
function renderList(){
  const el=$('list');
  if(curTab==='live'){
    const rows=[..._pos].sort((a,b)=>(+b.profit||0)-(+a.profit||0));
    if(!rows.length){el.innerHTML='<div class="empty">No open trades right now.</div>';return;}
    el.innerHTML=rows.map(p=>{const long=(p.type||'').toLowerCase()==='long',pn=+p.profit||0;
      return `<div class="row"><span class="sym">${sym(p.symbol||p.asset)}</span><span class="dir ${long?'l':'s'}">${long?'LONG':'SHORT'}</span>
        <span class="det">${(+p.volume||0)} lots · @${fmt(p.price_open)}</span>
        <span class="rt"><div class="big ${pn>=0?'up':'down'}">${pn>=0?'+':'-'}$${Math.abs(pn).toFixed(2)}</div></span></div>`;}).join('');
  } else if(curTab==='closed'){
    const rows=[..._closed].sort((a,b)=>new Date(b.exit_ts)-new Date(a.exit_ts)).slice(0,120);
    if(!rows.length){el.innerHTML='<div class="empty">No closed trades yet.</div>';return;}
    el.innerHTML=rows.map(t=>{const long=(t.action||'').toLowerCase()==='long',r=+t.pnl_r||0,$$=+t.real_profit||0,win=r>=0;
      const key=String(t.position_id||t.ticket||t.exit_ts||'');
      const emoji=t.exit_emoji||(win?'🎯':'📉'), why=(t.exit_reason||'Closed at the broker.').replace(/"/g,'&quot;');
      const blip=t.active_exit?`<i class="blip" title="actively-managed exit"></i>`:'';
      return `<div class="citem ${_expanded.has(key)?'open':''}" data-k="${key}">
        <div class="row crow" title="${emoji} ${why}">
          <span class="sym">${sym(t.asset)}${blip}</span><span class="dir ${long?'l':'s'}">${long?'LONG':'SHORT'}</span>
          <span class="det">${t.exit_ts?ago(t.exit_ts)+' ago':''} <span style="opacity:.8">${emoji}</span></span>
          <span class="rt"><div class="big ${win?'up':'down'}">${win?'+':''}${r.toFixed(2)}R</div><div class="small">${$$>=0?'+':'-'}$${Math.abs($$).toFixed(2)}</div></span>
        </div>
        <div class="tdetail">
          <div class="why">${emoji} ${t.exit_reason||'Closed at the broker.'}</div>
          <div class="tstats">
            <span>Entry <b>${fmt(t.entry)}</b></span><span>Exit <b>${t.exit_price!=null?fmt(t.exit_price):'—'}</b></span>
            <span>Stop-loss <b>${fmt(t.stop)}</b></span><span>Take-profit <b>${t.take_profit!=null?fmt(t.take_profit):'—'}</b></span>
          </div>
        </div></div>`;}).join('');
  } else {
    const rows=[..._scholars].filter(s=>s).slice(0,16);
    if(!rows.length){el.innerHTML='<div class="empty">Scholars warming up…</div>';return;}
    const mx=Math.max(0.2,...rows.map(s=>Math.abs(+s.expectancy_r||0)));
    el.innerHTML=rows.map(s=>{const e=+s.expectancy_r||0,pos=e>=0,w=Math.min(100,Math.abs(e)/mx*100);
      const col=s.benched?'#6b7b9a':(pos?'var(--green)':'var(--red)');
      const ins=s.insight?`<div class="sins">“${s.insight}”</div>`:'';
      return `<div class="row srow ${s.benched?'benched':''}"><div class="top">
        <span class="sym" style="min-width:96px;font-size:12.5px">${s.name||''}</span>
        <span class="sbar"><i style="width:${w}%;background:${col};box-shadow:0 0 8px ${col}"></i></span>
        <span class="rt"><div class="big ${pos?'up':'down'}" style="font-size:13px">${pos?'+':''}${e.toFixed(2)}R</div><div class="small">${s.experience||0} trades${s.benched?' · benched':''}</div></span>
        </div>${ins}</div>`;}).join('');
  }
}
const sym=s=>String(s||'').replace(/USD$/,'/USD').replace('//','/');
const fmt=v=>v!=null?(+v).toLocaleString('en-US',{maximumFractionDigits:5}):'—';
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{curTab=t.dataset.t;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));renderList();});
// tap a closed trade to expand its entry/exit/SL/TP + why-it-left explanation
$('list').addEventListener('click',e=>{const it=e.target.closest('.citem');if(!it||curTab!=='closed')return;
  const k=it.dataset.k;if(_expanded.has(k))_expanded.delete(k);else _expanded.add(k);
  if(navigator.vibrate)navigator.vibrate(8);renderList();});
document.querySelectorAll('.seg b').forEach(b=>b.onclick=()=>{chartMode=b.dataset.m;document.querySelectorAll('.seg b').forEach(x=>x.classList.toggle('on',x===b));drawEdge();});
$('heroCard').onclick=()=>{curTab='live';document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.t==='live'));renderList();$('list').scrollIntoView({behavior:'smooth',block:'center'});};

/* ── sound + haptic + toast ── */
let soundOn=localStorage.getItem('snd')!=='0',actx=null;
$('snd').classList.toggle('on',soundOn);
function initAudio(){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}catch(e){}}
document.addEventListener('touchstart',initAudio,{once:false});document.addEventListener('click',initAudio,{once:false});
$('snd').onclick=e=>{e.stopPropagation();soundOn=!soundOn;localStorage.setItem('snd',soundOn?'1':'0');$('snd').classList.toggle('on',soundOn);initAudio();if(soundOn)chime(true);};
function chime(win){if(!soundOn||!actx)return;const t=actx.currentTime;const notes=win?[660,880,1175]:[440,330];
  notes.forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;
    o.connect(g);g.connect(actx.destination);const s=t+i*0.09;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(.18,s+.02);g.gain.exponentialRampToValueAtTime(.001,s+.32);o.start(s);o.stop(s+.34);});}
let toastT;function toast(msg,win){const el=$('toast');el.innerHTML=msg;el.style.color=win?'var(--green)':'var(--red)';el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),3400);}
function onClose(t){const win=(+t.pnl_r||0)>=0;chime(win);if(navigator.vibrate)navigator.vibrate(win?[40,40,40]:90);
  toast(`${win?'✓':'✕'} ${sym(t.asset)} closed <b>${win?'+':''}${(+t.pnl_r||0).toFixed(2)}R</b>`,win);}

/* ── exits (management brain) ── */
function renderExits(mb){
  const el=$('exitRows');if(!mb||mb.error){el.innerHTML='<div class="erow"><span class="dim">warming up…</span></div>';return;}
  const order=['Bull','Sideways','Bear'];
  const rows=order.filter(r=>mb[r]).map(r=>{const c=mb[r];
    const eff=c.exit_efficiency, hasN=(c.trades||0)>=1;
    const effPct=eff==null?'—':Math.round(eff*100)+'%';
    const cls=eff==null?'':eff>=0.8?'g':eff>=0.6?'y':'r';
    const gb=c.avg_giveback_r==null?'—':c.avg_giveback_r.toFixed(2)+'R';
    return `<div class="erow"><span class="rg">${r}</span>
      <span class="m">${hasN?`eff <b class="eff ${cls}">${effPct}</b>`:'<span class="dim">learning…</span>'}
        ${hasN?`· give-back <b>${gb}</b>`:''}
        · trail <b>${(c.trail_mult||2.6).toFixed(1)}×</b></span></div>`;}).join('');
  el.innerHTML=rows||'<div class="erow"><span class="dim">warming up…</span></div>';
}

/* ── main loop ── */
let _lastClosedTs=null,_seeded=false;
async function tick(){
  try{
    const [perf,acc,brain,sch,trades,mbrain]=await Promise.all([
      get('/api/performance'),get('/api/account'),get('/api/brain').catch(()=>({})),
      get('/api/scholars').catch(()=>({scholars:[]})),get('/api/trades').catch(()=>[]),
      get('/api/manage_brain').catch(()=>({}))]);
    $('live').classList.remove('off');$('liveTxt').textContent='LIVE';
    const bal=acc.balance??perf.balance??0,eq=acc.equity??perf.equity??bal;
    _pos=acc.positions||[];const open=_pos.length;const floatPnl=_pos.reduce((s,p)=>s+(+p.profit||0),0);
    setV('equity',money(eq));
    const fc=$('floatChip');fc.className='chip '+(floatPnl>.5?'up':floatPnl<-.5?'down':'flat');
    fc.textContent=(floatPnl>=0?'▲ +':'▼ -')+'$'+Math.abs(floatPnl).toFixed(2);
    $('openTxt').textContent=open+' open';
    setV('balance',money(bal));
    const net=perf.net_profit??0;setV('net',money2(net));$('net').className='v '+(net>=0?'green':'red');
    const cl=perf.closed??0,w=perf.wins??0,l=perf.losses??0,wr=cl?Math.round(w/cl*100):0;
    setV('closed',cl);setV('wr',cl?wr+'%':'—');$('wrW').style.width=(cl?w/cl*100:0)+'%';$('wrL').style.width=(cl?l/cl*100:0)+'%';
    setV('wins',w+' wins');setV('losses',l+' losses');
    // margin level = equity / used-margin × 100 (used = equity − free)
    if(acc.margin_free!=null && eq){
      const used=eq-acc.margin_free, lvl=used>1?eq/used*100:null;
      const ml=$('marginLvl');
      if(lvl!=null){ setV('marginLvl',Math.round(lvl)+'%');
        ml.className='v '+(lvl>=250?'green':lvl>=150?'cyan':'red'); }
      else { setV('marginLvl','∞'); ml.className='v green'; }
      setV('margin','$'+Math.round(acc.margin_free).toLocaleString('en-US')+' free'
        +(lvl!=null&&lvl<200?(lvl<130?' · 🛟 de-risking':' · ⏸️ entries paused'):''));
    } else { setV('marginLvl','—'); setV('margin','—'); }
    _scholars=(sch&&sch.scholars)||[];
    _closed=(Array.isArray(trades)?trades:[]).filter(t=>t.status==='closed'&&t.exit_ts);
    _closedSorted=[..._closed].sort((a,b)=>new Date(a.exit_ts)-new Date(b.exit_ts));
    const exp=(typeof brain.expectancy_r==='number')?brain.expectancy_r:(net>0?.05:net<0?-.12:0);
    // Rank reflects the BRAIN's own track record (its council trades) — the same
    // source the edge curve uses — not the broker account total (which includes
    // scale-ins, trimmed duplicates and pre-reset trades).
    renderRank(_closedSorted.length||(typeof brain.experience==='number'?Math.round(brain.experience):0), exp);
    renderExits(mbrain);
    drawEdge();renderList();
    // trade-close detection
    const newest=_closedSorted.length?_closedSorted[_closedSorted.length-1].exit_ts:null;
    if(_seeded&&newest&&newest!==_lastClosedTs){
      const fresh=_closedSorted.filter(t=>!_lastClosedTs||new Date(t.exit_ts)>new Date(_lastClosedTs));
      fresh.slice(-3).forEach(onClose);
    }
    _lastClosedTs=newest;_seeded=true;
    $('foot').textContent='updated '+new Date().toLocaleTimeString()+' · tap to refresh ↻';
  }catch(e){$('live').classList.add('off');$('liveTxt').textContent='RECONNECTING';$('foot').textContent='reconnecting…';}
}
$('foot').onclick=()=>{$('foot').textContent='refreshing…';tick();if(navigator.vibrate)navigator.vibrate(15);};
window.addEventListener('resize',()=>drawEdge());
tick();setInterval(tick,5000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)tick();});
</script>
